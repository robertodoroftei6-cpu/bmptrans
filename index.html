<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMP Trans SRL · Transport Internațional</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23181818'/%3E%3Cpolygon points='32,4 60,32 32,60 4,32' fill='%231a2744'/%3E%3Cpolygon points='32,4 60,32 32,60 4,32' fill='none' stroke='%23c8a84b' stroke-width='2'/%3E%3Ctext font-family='Georgia,serif' font-weight='700' font-size='22' letter-spacing='-1' text-anchor='middle' dominant-baseline='central' fill='%23ffffff' x='32' y='31'%3EBMP%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#181818;--bg2:#1f1f1f;--bg3:#252525;--surf:#2c2c2c;--bdr:#363636;--acc:#c8a84b;--acc2:#e0c26a;--txt:#e6e6e6;--mut:#888;--dim:#4a4a4a;}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;font-weight:300;overflow-x:hidden;}
/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:900;height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(14,14,14,.97);backdrop-filter:blur(18px);border-bottom:1px solid var(--bdr);}
.nlogo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.nlogo-svg{width:38px;height:38px;flex-shrink:0;}
.nlogo-text{display:flex;flex-direction:column;line-height:1;}
.nlogo-bmp{font-family:'Georgia','Times New Roman',serif;font-weight:700;font-size:1.15rem;letter-spacing:.02em;color:#ffffff;line-height:1;}
.nlogo-sub{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:400;font-size:.6rem;letter-spacing:.32em;color:var(--acc);text-transform:uppercase;margin-top:2px;}
.nlinks{display:flex;gap:28px;list-style:none;}
.nlinks a{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);text-decoration:none;transition:color .2s;}
.nlinks a:hover{color:var(--acc);}
.nav-right{display:flex;align-items:center;gap:14px;}
.btn-contact-nav{background:var(--acc);color:#111;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;border:none;padding:9px 18px;cursor:pointer;transition:background .2s;}
.btn-contact-nav:hover{background:var(--acc2);}
.lsw{display:flex;border:1px solid var(--bdr);border-radius:3px;overflow:hidden;}
.lb{background:transparent;border:none;color:var(--mut);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.12em;padding:6px 12px;cursor:pointer;transition:background .2s,color .2s;}
.lb.on{background:var(--acc);color:#111;}
/* ── HERO ── */
#hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:flex-start;overflow:hidden;padding-top:66px;}
@keyframes textMotion{0%{transform:translateX(0) translateY(0) perspective(1000px) rotateX(0deg);opacity:.08}100%{transform:translateX(140px) translateY(-50px) perspective(1000px) rotateX(-18deg);opacity:0}}
.htitle-wrapper{position:relative;display:inline-block;perspective:1200px;}
.htitle-shadow{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(2.8rem,6.8vw,6rem);line-height:1;color:var(--txt);position:absolute;top:0;left:0;white-space:nowrap;margin:0;animation:textMotion 2.5s ease-out infinite;z-index:0;pointer-events:none;}
.htitle-shadow:nth-child(1){animation-delay:0s}
.htitle-shadow:nth-child(2){animation-delay:.25s}
.htitle-shadow:nth-child(3){animation-delay:.5s}
.htitle-shadow:nth-child(4){animation-delay:.75s}
.htitle{position:relative;z-index:2;}
.hmap{position:absolute;top:0;right:0;width:64%;height:100%;pointer-events:none;display:flex;align-items:center;justify-content:center;}
.hmap svg{width:100%;height:100%;opacity:.16;filter:drop-shadow(0 0 40px rgba(200,168,75,.1));}
.hov{position:absolute;inset:0;background:linear-gradient(108deg,#0f0f0f 26%,rgba(14,14,14,.78) 55%,transparent 100%);}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(200,168,75,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(200,168,75,.028) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse at 24% 62%,black 12%,transparent 65%);}
.hero-watermark{position:absolute;right:-40px;bottom:-40px;width:420px;height:420px;opacity:.04;pointer-events:none;}
.hcontent{position:relative;z-index:2;padding:0 52px;max-width:600px;}
.hey{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.66rem;letter-spacing:.46em;text-transform:uppercase;color:var(--acc);margin-bottom:18px;opacity:0;animation:up .9s .1s forwards;}
.htitle{font-family:'Playfair Display',serif;font-weight:900;font-size:clamp(2.8rem,6.8vw,6rem);line-height:1.0;margin-bottom:8px;opacity:0;animation:up .9s .3s forwards;}
.htitle .gold{color:var(--acc);}
.hdiv{width:50px;height:2px;background:var(--acc);margin:20px 0;opacity:0;animation:fi .7s .55s forwards;}
.hsub{font-size:.96rem;color:var(--mut);line-height:1.85;max-width:400px;margin-bottom:34px;opacity:0;animation:up .9s .72s forwards;}
.hctas{display:flex;gap:13px;opacity:0;animation:up .9s .9s forwards;}
.btng{background:var(--acc);color:#111;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;border:none;padding:13px 30px;cursor:pointer;text-decoration:none;display:inline-block;transition:background .2s,transform .15s;}
.btng:hover{background:var(--acc2);transform:translateY(-2px);}
.btno{background:transparent;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;border:1px solid var(--bdr);padding:13px 30px;cursor:pointer;text-decoration:none;display:inline-block;transition:border-color .2s,color .2s;}
.btno:hover{border-color:var(--acc);color:var(--acc);}
.hscroll{position:absolute;bottom:26px;left:52px;display:flex;flex-direction:column;gap:7px;opacity:0;animation:fi 1s 1.4s forwards;}
.hscroll span{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.32em;text-transform:uppercase;color:var(--dim);}
.hline{width:1px;height:32px;background:linear-gradient(to bottom,var(--acc),transparent);animation:lp 2s ease-in-out infinite;}
/* ── SECTION COMMONS ── */
.seye{font-family:'Barlow Condensed',sans-serif;font-size:.64rem;font-weight:600;letter-spacing:.44em;text-transform:uppercase;color:var(--acc);margin-bottom:12px;}
.shead{font-family:'Playfair Display',serif;font-weight:700;font-size:clamp(1.8rem,3.6vw,2.9rem);line-height:1.1;margin-bottom:50px;}
/* ── ROUTE ── */
#route{padding:90px 52px;background:var(--bg2);position:relative;}
#route::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.26;}
.rvis{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:52px;flex-wrap:wrap;}
.rstop{text-align:center;flex:1;max-width:180px;min-width:100px;}
.rflag{font-size:2.2rem;display:block;margin-bottom:9px;}
.rcity{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.45rem;text-transform:uppercase;letter-spacing:.05em;transition:color .4s;}
.rsub{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);margin-top:3px;}
.rstop.lit .rcity{color:var(--acc);}
.rconn{flex:1;max-width:120px;min-width:40px;position:relative;height:2px;margin:0 5px;background:linear-gradient(90deg,var(--acc),rgba(200,168,75,.15),var(--acc));}
.rconn::after{content:'';position:absolute;top:-3px;left:0;width:7px;height:7px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc);animation:dotm 2.8s linear infinite;}
.rconn:nth-of-type(4)::after{animation-delay:1.4s;}
.rnote{max-width:580px;margin:0 auto;text-align:center;font-size:.8rem;color:var(--dim);line-height:1.7;font-style:italic;padding-top:20px;border-top:1px solid var(--bdr);}
/* ── COMFORT ── */
#comfort{padding:90px 52px;background:var(--bg);}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;margin-top:48px;}
.vanw svg{width:100%;height:auto;filter:drop-shadow(0 14px 44px rgba(0,0,0,.6));}
.vcap{text-align:center;margin-top:12px;font-family:'Barlow Condensed',sans-serif;font-size:.64rem;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);}
.feats{display:flex;flex-direction:column;}
.feat{display:flex;gap:16px;align-items:flex-start;padding:19px 0;border-bottom:1px solid var(--bdr);}
.feat:last-child{border-bottom:none;padding-bottom:0;}
.fic{width:39px;height:39px;background:var(--surf);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0;}
.ft{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.fd{font-size:.84rem;color:var(--mut);line-height:1.65;}
/* ── SERVICES ── */
#services{padding:90px 52px;background:var(--bg2);}
.svgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:48px;}
.svc{background:var(--bg3);padding:44px 36px;position:relative;overflow:hidden;transition:background .3s;}
.svc::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--acc);transition:width .4s;}
.svc:hover::after{width:100%;}
.svc:hover{background:#272727;}
.svn{font-family:'Playfair Display',serif;font-weight:900;font-size:3.2rem;color:rgba(200,168,75,.1);line-height:1;margin-bottom:11px;user-select:none;}
.svt{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.45rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
.svd{font-size:.85rem;color:var(--mut);line-height:1.75;max-width:320px;}
/* ── TRUST ── */
#trust{padding:90px 52px;background:var(--bg);}
.tin{max-width:660px;margin:0 auto;text-align:center;}
.tq{font-family:'Playfair Display',serif;font-size:1.12rem;font-weight:400;line-height:1.85;color:var(--txt);margin-top:20px;}
.tq em{color:var(--acc);font-style:italic;}
.stats{display:flex;justify-content:center;gap:48px;margin-top:36px;padding-top:32px;border-top:1px solid var(--bdr);flex-wrap:wrap;}
.stat .n{font-family:'Playfair Display',serif;font-weight:900;font-size:2.3rem;color:var(--acc);display:block;line-height:1;}
.stat .l{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mut);margin-top:4px;display:block;}
/* ── REVIEWS ── */
#reviews{padding:64px 52px 90px;background:var(--bg);}
.rvgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:40px;}
.rvc{background:var(--bg2);border:1px solid var(--bdr);padding:24px 20px;position:relative;}
.rvg{position:absolute;top:12px;right:13px;font-size:.58rem;font-weight:700;letter-spacing:.06em;color:var(--dim);}
.rvtop{display:flex;align-items:center;gap:10px;margin-bottom:11px;}
.rvav{width:36px;height:36px;border-radius:50%;background:var(--surf);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;}
.rvnm{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.05em;filter:blur(4px);user-select:none;}
.rvsrc{font-size:.67rem;color:var(--mut);margin-top:1px;}
.rvst{color:var(--acc);font-size:.82rem;letter-spacing:2px;margin-bottom:10px;}
.rvtx{font-size:.83rem;line-height:1.72;color:var(--mut);}
/* ── CTA ── */
#cta{padding:90px 52px;background:var(--bg2);text-align:center;position:relative;overflow:hidden;}
#cta::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:460px;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.16;}
.ctain{position:relative;z-index:1;max-width:500px;margin:0 auto;}
.ctasub{font-size:.92rem;color:var(--mut);line-height:1.8;margin:14px 0 28px;}
/* ── FOOTER ── */
footer{background:#101010;border-top:1px solid var(--bdr);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;}
.footer-logo{display:flex;align-items:center;gap:9px;}
.footer-logo-svg{width:28px;height:28px;opacity:.8;}
.footer-logo-text{font-family:'Georgia','Times New Roman',serif;font-weight:700;font-size:.82rem;color:var(--acc);letter-spacing:.02em;}
.footer-logo-sub{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;letter-spacing:.28em;color:var(--dim);text-transform:uppercase;margin-top:1px;}
.fcopy{font-size:.68rem;color:var(--dim);}
/* ── REVEAL ── */
.rv{opacity:0;transform:translateY(24px);transition:opacity .7s,transform .7s;}
.rv.in{opacity:1;transform:translateY(0);}
/* ══ CONTACT POPUP ══ */
.popup-bg{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.78);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;padding:20px;}
.popup-bg.open{opacity:1;pointer-events:all;}
.popup{background:var(--bg2);border:1px solid var(--bdr);width:100%;max-width:740px;max-height:90vh;overflow-y:auto;position:relative;transform:translateY(20px);transition:transform .3s;}
.popup-bg.open .popup{transform:translateY(0);}
.popup-close{position:absolute;top:16px;right:18px;background:transparent;border:none;color:var(--mut);font-size:1.4rem;cursor:pointer;transition:color .2s;z-index:1;}
.popup-close:hover{color:var(--acc);}
.ph{padding:36px 44px 26px;background:linear-gradient(155deg,#111 0%,var(--bg2) 100%);border-bottom:1px solid var(--bdr);position:relative;overflow:hidden;}
.ph::after{content:'24/7';position:absolute;right:24px;bottom:-18px;font-family:'Playfair Display',serif;font-weight:900;font-size:6rem;color:rgba(200,168,75,.05);line-height:1;pointer-events:none;}
.ph-logo{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.ph-logo svg{width:44px;height:44px;}
.ph-logo-text{}
.ph-logo-bmp{font-family:'Georgia','Times New Roman',serif;font-weight:700;font-size:1.3rem;color:#fff;line-height:1;}
.ph-logo-sub{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.3em;color:var(--acc);text-transform:uppercase;margin-top:2px;}
.ph-title{font-family:'Playfair Display',serif;font-weight:900;font-size:2rem;line-height:1.05;margin-bottom:10px;}
.ph-sub{font-size:.87rem;color:var(--mut);line-height:1.8;max-width:420px;}
.live-badge{display:inline-flex;align-items:center;gap:9px;background:var(--surf);border:1px solid var(--bdr);padding:7px 14px;margin-top:16px;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;color:var(--mut);}
.dot-live{width:7px;height:7px;border-radius:50%;background:#4caf82;box-shadow:0 0 0 3px rgba(76,175,130,.2);animation:lv 2s ease-in-out infinite;}
@keyframes lv{0%,100%{box-shadow:0 0 0 3px rgba(76,175,130,.2)}50%{box-shadow:0 0 0 6px rgba(76,175,130,.05)}}
.pbody{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.pcol{padding:30px 34px;}
.pcol-l{background:var(--bg3);}
.pcol-r{background:var(--bg);}
.ptag{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.62rem;letter-spacing:.38em;text-transform:uppercase;color:var(--acc);margin-bottom:20px;}
.dcard{background:var(--surf);border:1px solid var(--bdr);padding:18px;margin-bottom:11px;position:relative;transition:border-color .22s;}
.dcard:last-of-type{margin-bottom:0;}
.dcard:hover{border-color:var(--acc);}
.dflags{position:absolute;top:11px;right:11px;font-size:.82rem;display:flex;gap:3px;}
.dname{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem;text-transform:uppercase;letter-spacing:.05em;}
.drole{font-size:.66rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mut);margin-top:2px;margin-bottom:12px;}
.droute{display:flex;align-items:center;gap:5px;margin-bottom:11px;flex-wrap:wrap;}
.rtag{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.08em;padding:2px 7px;background:var(--bg3);border:1px solid var(--bdr);color:var(--mut);}
.rarr{color:var(--acc);font-size:.66rem;opacity:.6;}
.call-btn{display:flex;align-items:center;gap:10px;width:100%;background:var(--bg);border:1px solid var(--bdr);padding:10px 13px;cursor:pointer;transition:border-color .2s,background .2s;position:relative;}
.call-btn:hover{border-color:var(--acc);background:rgba(200,168,75,.04);}
.call-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;letter-spacing:.07em;color:var(--txt);}
.call-lbl{font-size:.63rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);margin-left:auto;}
.copy-toast{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--acc);color:#111;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;padding:3px 8px;opacity:0;pointer-events:none;transition:opacity .25s;}
.copy-toast.show{opacity:1;}
.schtbl{width:100%;border-collapse:collapse;margin-top:8px;}
.schtbl td{padding:7px 0;border-bottom:1px solid var(--bdr);font-size:.8rem;color:var(--mut);}
.schtbl td:first-child{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--txt);letter-spacing:.05em;width:40%;}
.schtbl tr:last-child td{border-bottom:none;}
.schnote{font-size:.7rem;color:var(--dim);margin-top:10px;line-height:1.6;}
.iblk{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--bdr);}
.iblk:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ilbl{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.38em;text-transform:uppercase;color:var(--acc);margin-bottom:7px;}
.ival{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;color:var(--txt);display:block;}
.isub{font-size:.78rem;color:var(--mut);margin-top:3px;line-height:1.6;}
.wa-btn{display:inline-flex;align-items:center;gap:9px;background:var(--acc);color:#111;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;border:none;padding:11px 20px;cursor:pointer;text-decoration:none;transition:background .2s,transform .15s;margin-top:12px;}
.wa-btn:hover{background:var(--acc2);transform:translateY(-2px);}
.cd{fill:#232323;stroke:#303030;stroke-width:.5;}
.cro{fill:#1d2e19;stroke:#477a3e;stroke-width:.9;}
.cat{fill:#231f15;stroke:#877830;stroke-width:.9;}
.cde{fill:#192028;stroke:#3a6879;stroke-width:.9;}
.rml{fill:none;stroke:var(--acc);stroke-width:1.8;stroke-dasharray:6 4;opacity:.72;animation:dash 3s linear infinite;}
.cdot{fill:var(--acc);}
.cdot1{animation:cp1 2.5s ease-in-out infinite;}
.cdot2{animation:cp1 2.5s ease-in-out .9s infinite;}
.cdot3{animation:cp1 2.5s ease-in-out 1.8s infinite;}
.clbl{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-size:6.5px;font-weight:700;fill:#c8a84b;letter-spacing:.1em;}
@keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fi{to{opacity:1}}
@keyframes lp{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes dotm{0%{left:0;opacity:0}8%{opacity:1}92%{opacity:1}100%{left:100%;opacity:0}}
@keyframes dash{to{stroke-dashoffset:-20}}
@keyframes cp1{0%,100%{r:3.5;opacity:1}50%{r:5.2;opacity:.5}}
@media(max-width:768px){
  nav{padding:0 16px;}
  .nlinks{display:none;}
  .hcontent{padding:0 18px;}
  .hscroll{left:18px;}
  #route,#comfort,#services,#trust,#reviews,#cta{padding:60px 18px;}
  .cgrid,.svgrid,.rvgrid{grid-template-columns:1fr;}
  .stats{gap:22px;}
  footer{flex-direction:column;gap:10px;text-align:center;padding:20px 18px;}
  .rvis{flex-direction:column;gap:18px;align-items:center;}
  .rconn{width:2px;height:36px;margin:0;background:linear-gradient(to bottom,var(--acc),rgba(200,168,75,.15),var(--acc));}
  .pbody{grid-template-columns:1fr;}
  .ph{padding:26px 20px 20px;}
  .ph-title{font-size:1.6rem;}
  .pcol{padding:22px 18px;}
  .hmap{width:100%;opacity:.08;}
  .hero-watermark{width:260px;height:260px;right:-20px;bottom:-20px;}
}
</style>
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">

<script>
function openPopup(){document.getElementById('popup-bg').classList.add('open');document.body.style.overflow='hidden';}
function closePopup(){document.getElementById('popup-bg').classList.remove('open');document.body.style.overflow='';}
function bgClose(e){if(e.target===document.getElementById('popup-bg'))closePopup();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});
function smartCall(num,btn){const mob=/android|iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());if(mob){window.location.href='tel:'+num;}else{const toast=btn.querySelector('.copy-toast');const copy=t=>{toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2200);};navigator.clipboard?navigator.clipboard.writeText(num).then(copy).catch(()=>{fb();copy();}):fb();function fb(){const i=document.createElement('input');i.value=num;document.body.appendChild(i);i.select();document.execCommand('copy');document.body.removeChild(i);}}}
const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting)e.target.classList.add('in');});},{threshold:.11});
document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
const sp=['rs0','rs1','rs2'];let si=0;
setInterval(()=>{sp.forEach(s=>document.getElementById(s).classList.remove('lit'));document.getElementById(sp[si]).classList.add('lit');si=(si+1)%sp.length;},1400);
</script>
